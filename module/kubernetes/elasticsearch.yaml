apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: elasticsearch
  namespace: elasticsearch
spec:
  version: 8.15.0
  volumeClaimDeletePolicy: DeleteOnScaledownOnly
  http:
    tls:
      selfSignedCertificate:
        subjectAltNames:
          - dns: es-dev.gettruepower.net
          - dns: elasticsearch-es-http.elasticsearch.svc
  nodeSets:
    - name: default
      count: 5
      config:
        node:
          roles:
            - master
            - data
            - ingest
          store.allow_mmap: false
        xpack:
          monitoring:
            collection:
              enabled: true
      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes:
              - ReadWriteOnce
            # storageClassName: ""
            resources:
              requests:
                storage: 200Gi
      podTemplate:
        metadata:
          labels:
            elastic-pod-label: "elasticsearch"
        spec:
          initContainers:
            - name: sysctl
              securityContext:
                privileged: true
              command: ["sh", "-c", "sysctl -w vm.max_map_count=262144"]
          containers:
            - name: elasticsearch
              env:
                - name: ES_JAVA_OPTS
                  value: -Xms2g -Xmx2g
              resources:
                requests:
                  memory: 4Gi
                  cpu: 500m
                limits:
                  memory: 4Gi
          # affinity:
          #   # Hard requirement for elasticsearch pods to be scheduled on a different node
          #   # from other elasticsearch pods
          #   podAntiAffinity:
          #     requiredDuringSchedulingIgnoredDuringExecution:
          #       - labelSelector:
          #           matchExpressions:
          #             - key: elastic-pod-label
          #               operator: In
          #               values:
          #               - elasticsearch
          #         topologyKey: topology.kubernetes.io/zone
